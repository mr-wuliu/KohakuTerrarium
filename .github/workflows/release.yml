name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: src/kohakuterrarium-frontend
        run: |
          npm ci
          npm run build

      - name: Install briefcase
        run: pip install briefcase

      - name: Pre-build wheels for sdist-only deps
        shell: bash
        run: |
          mkdir -p wheels
          pip wheel proxy_tools -w wheels --no-deps

      - name: Create briefcase project
        run: briefcase create

      - name: Build briefcase app
        run: briefcase build

      - name: Package briefcase app
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macOS" ]; then
            briefcase package --adhoc-sign
          else
            briefcase package
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          # Windows: .msi in dist/
          # macOS: .dmg in dist/
          cp dist/*.msi artifacts/ 2>/dev/null || true
          cp dist/*.dmg artifacts/ 2>/dev/null || true
          cp dist/*.zip artifacts/ 2>/dev/null || true
          # Fallback: grab anything briefcase produced
          find dist/ -maxdepth 1 -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.app" \) -exec cp {} artifacts/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: artifacts/

  publish-pypi:
    needs: [build-wheel]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [build-wheel, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect all files
        run: |
          mkdir release
          find all-artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'b') || contains(github.ref, 'rc') }}
