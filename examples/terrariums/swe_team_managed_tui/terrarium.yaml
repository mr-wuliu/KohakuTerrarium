# SWE Team with Root Agent (TUI)
# Same SWE team as terrariums/swe_team, but with a root agent
# sitting OUTSIDE the terrarium, interacting with the user via TUI.
#
# The root agent manages the team: sends tasks, observes progress,
# reports results. The user talks to root, not to the team directly.
#
# Usage:
#   kt terrarium run examples/terrariums/swe_team_managed_tui/

terrarium:
  name: swe_team_managed_tui

  root:
    config: ../../../creatures/root
    interface: tui

  creatures:
    - name: swe
      config: ../../../creatures/swe
      channels:
        listen: [tasks, feedback, team_chat]
        can_send: [review, team_chat]

    - name: reviewer
      config: ../../../creatures/reviewer
      channels:
        listen: [review, team_chat]
        can_send: [feedback, results, team_chat]

  channels:
    tasks:      { type: queue, description: "Task assignments from root to developer" }
    review:     { type: queue, description: "Code changes submitted for review" }
    feedback:   { type: queue, description: "Review feedback back to developer" }
    results:    { type: queue, description: "Final approved results" }
    team_chat:  { type: broadcast, description: "Team coordination and status" }
